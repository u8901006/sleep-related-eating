<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌙 SRED 研究簡報 | 歷史報告</title>
<meta name="description" content="睡眠相關飲食障礙 (SRED) 每日研究文獻簡報歷史列表">
<style>
:root{--bg:#f6f1e8;--surface:#fffaf2;--line:#d8c5ab;--text:#2b2118;--muted:#766453;--accent:#8c4f2b;--accent-soft:#ead2bf}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:20px}
.container{max-width:820px;margin:0 auto}
header{text-align:center;padding:40px 20px 24px}
header h1{font-size:26px;color:var(--accent);margin-bottom:6px}
header .subtitle{color:var(--muted);font-size:15px;margin-bottom:14px}
.desc{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:24px;margin-bottom:32px;text-align:center;line-height:1.8;font-size:15px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:16px}
.clinic-banner{background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:28px 24px;text-align:center;margin:32px 0 24px}
.clinic-banner h3{color:var(--accent);font-size:19px;margin-bottom:16px}
.clinic-links{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.clinic-links a{display:inline-block;padding:8px 22px;border-radius:20px;text-decoration:none;font-size:14px;font-weight:600;transition:transform .2s}
.clinic-links a:hover{transform:translateY(-2px)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--accent-soft);color:var(--accent)}
footer{text-align:center;padding:24px;color:var(--muted);font-size:12px;line-height:1.8}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🌙 睡眠相關飲食障礙 (SRED) 每日研究簡報</h1>
    <p class="subtitle">Sleep-Related Eating Disorder Research Daily Briefing</p>
  </header>
  <div class="desc">
    每日自動從 PubMed 抓取最新的 SRED 相關文獻，經 AI 深度分析後生成簡報。<br>
    涵蓋範圍：睡眠醫學、神經學、精神醫學、營養學、肥胖/代謝等領域。
  </div>
  <div class="empty">尚無報告，請等待首次自動執行。</div>
  <div class="clinic-banner">
    <h3>🏥 李政洋身心診所</h3>
    <div class="clinic-links">
      <a href="https://www.leepsyclinic.com/" class="btn-primary" target="_blank" rel="noopener">診所首頁</a>
      <a href="https://blog.leepsyclinic.com/" class="btn-secondary" target="_blank" rel="noopener">訂閱電子報</a>
      <a href="https://buymeacoffee.com/CYlee" class="btn-secondary" target="_blank" rel="noopener">☕ Buy me a coffee</a>
    </div>
  </div>
  <footer>
    <p>資料來源：<a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank" rel="noopener">PubMed</a></p>
    <p>本簡報由自動化系統生成，僅供學術參考</p>
    <p>&copy; 2026 <a href="https://www.leepsyclinic.com/" target="_blank" rel="noopener">李政洋身心診所</a></p>
  </footer>
</div>
</body>
</html>
